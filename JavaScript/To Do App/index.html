<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickStickz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="heading">
        <img src="QuickStickz_Logo.png" alt="QuickStickz">
        <h1 id="typing"></h1>
    </div>
    <div class="button">
        <button>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" class="bi bi-plus-lg" viewBox="0 0 16 16" style="fill: black;">
                <path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
            </svg>
            
        </button>
    </div>
    <div class="sticky-container">
        <div class="sticky-note" id="note1">
            <h2>Note Title 1</h2>
            <p>This is the content of sticky note 1.</p>
        </div>
        <div class="sticky-note" id="note2">
            <h2>Note Title 2</h2>
            <p>This is the content of sticky note 2.</p>
        </div>
    </div>
    
    
    <script src="script.js"></script>
</body>
</html>
